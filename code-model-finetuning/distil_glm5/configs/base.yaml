# Distillation dataset extraction config.

run_name: "glm5_fp8_code_distill_v0"

paths:
  out_dir: "out"
  prompts_jsonl: "out/prompts/prompt_pool.jsonl"
  raw_jsonl: "out/raw/teacher_generations.jsonl"
  curated_jsonl: "out/curated/curated.jsonl"
  export_dir: "out/export"

teacher:
  model_id: "zai-org/GLM-5-FP8"
  # OpenAI-compatible endpoint (vLLM / SGLang).
  base_url: "http://localhost:8000/v1"
  api_key: "EMPTY"
  timeout_s: 120
  max_retries: 4
  concurrency: 16

generation:
  seed: 42
  temperature: 0.6
  top_p: 0.95
  max_tokens: 768
  n: 1
  stop: []

prompt_pool:
  languages: ["python", "typescript", "javascript"]
  # Try to lower it down for experiments
  total_prompts: 10000
  task_mix:
    completion: 0.35
    bugfix: 0.20
    refactor: 0.15
    explain: 0.15
    tests: 0.10
    code_review: 0.05

filters:
  min_output_chars: 64
  max_output_chars: 20000
  drop_refusals: true
  require_python_syntax_valid: true
  require_ts_js_syntax_valid: true

# Optional second model to accept/reject teacher outputs (rejection sampling).
# Off by default. When enabled, only rows the judge accepts are kept.
# For better and higher quality data, we can enable this. If both Model agree on the output, Gold Standard Dataset is created.
judge:
  enabled: false
  model_id: "Qwen/Qwen2.5-Coder-7B-Instruct"
  base_url: "http://localhost:8000/v1"
  api_key: "EMPTY"
  timeout_s: 60
  max_retries: 2
  max_tokens: 10
  temperature: 0.0

dedup:
  enable_exact: true
  enable_near: false
  # Near-dup config will be enabled when `datasketch` is installed.
  near_jaccard_threshold: 0.92

